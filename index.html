<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kampagnenvideo</title>

<style>

:root{
--bg:#05070c;
--ink:#0b1020;
--white:#ffffff;

--emoSad:#7e111c;
--emoWarn:#5b2b86;
--emoHot:#8a1e2b;
}

*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:system-ui,Segoe UI,Roboto}
body{background:var(--bg);color:white;overflow:hidden}

.stage{
position:fixed;
inset:0;
background:linear-gradient(180deg,#060815,#02030a);
}

.videoWrap{
position:absolute;
inset:0;
opacity:0;
transition:opacity 1.1s ease;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.gate{
position:absolute;
inset:0;
display:grid;
place-items:center;
backdrop-filter:blur(14px);
background:rgba(0,0,0,.4);
z-index:50;
}

.clickMe{
padding:12px 18px;
border-radius:999px;
background:white;
color:#0b1020;
font-weight:800;
cursor:pointer;
}

.afterScene{
position:absolute;
inset:0;
opacity:0;
transition:opacity .6s ease;
z-index:40;
}

.whiteFade{
position:absolute;
inset:0;
background:white;
opacity:0;
transition:opacity .8s ease;
}

.textStage{
position:absolute;
inset:0;
display:grid;
place-items:center;
padding:30px;
color:var(--ink);
}

.group{
text-align:center;
opacity:0;
transform:translateY(10px);
transition:opacity .5s ease, transform .5s ease;
}

.group.show{
opacity:1;
transform:none;
}

.line{margin:0}

.lBig{font-size:clamp(22px,3.4vw,44px);font-weight:850}
.lMid{font-size:clamp(16px,2.1vw,26px);font-weight:700}
.lSmall{font-size:clamp(14px,1.7vw,18px);font-weight:600;opacity:.85}

.ink{color:var(--ink)}
.emoSad{color:var(--emoSad)}
.emoWarn{color:var(--emoWarn)}
.emoHot{color:var(--emoHot)}

.ctaPinned{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
transition:top 900ms ease;
text-align:center;
}

.ctaCard{
margin-top:16px;
display:grid;
gap:10px;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,.8);
backdrop-filter:blur(8px);
}

.ctaBtn{
display:inline-block;
padding:12px 16px;
border-radius:999px;
background:white;
color:#0b1020;
font-weight:800;
text-decoration:none;
}

.endImage{
position:absolute;
left:0;
bottom:0;
width:100%;
opacity:0;
transform:translateY(40px);
transition:opacity 1s ease, transform 1s ease;
pointer-events:none;
}

.endImage.show{
opacity:1;
transform:none;
}

.endFade{
position:absolute;
left:0;
bottom:100%;
width:100%;
height:200px;
background:linear-gradient(to top, white, rgba(255,255,255,0));
pointer-events:none;
}

.lang{
position:fixed;
top:14px;
right:14px;
display:none;
background:rgba(255,255,255,.8);
padding:8px 10px;
border-radius:999px;
z-index:80;
}

</style>
</head>

<body>

<div class="stage">

<div class="videoWrap" id="videoWrap">
<video id="vid" playsinline preload="auto">
<source src="campaign.mp4" type="video/mp4">
</video>
</div>

<div class="gate" id="gate">
<div class="clickMe" id="clickMe">Click me.</div>
</div>

<div class="afterScene" id="afterScene">
<div class="whiteFade" id="whiteFade"></div>

<div class="textStage">
<div id="textBox"></div>
</div>

<div class="endFade"></div>
<img src="endimage.jpg" class="endImage" id="endImage">

</div>

<div class="lang" id="langUI">
<select id="langSelect">
<option value="de">DE</option>
<option value="en">EN</option>
<option value="es">ES</option>
</select>
</div>

<audio id="atmo" preload="auto">
<source src="atmo.mp3">
</audio>

</div>

<script>

const vid=document.getElementById("vid")
const gate=document.getElementById("gate")
const clickMe=document.getElementById("clickMe")
const videoWrap=document.getElementById("videoWrap")
const afterScene=document.getElementById("afterScene")
const whiteFade=document.getElementById("whiteFade")
const textBox=document.getElementById("textBox")
const atmo=document.getElementById("atmo")
const endImage=document.getElementById("endImage")

const langUI=document.getElementById("langUI")
const langSelect=document.getElementById("langSelect")

let currentLang="de"
let started=false

const sleep=(ms)=>new Promise(r=>setTimeout(r,ms))

const WORDS_PER_MIN=210
const MS_PER_WORD=60000/WORDS_PER_MIN

const FDP_LINK="https://en.wikipedia.org/wiki/Free_Democratic_Party_(Germany)"

const CTA_I18N={
de:{label:"Mehr über die FDP erfahren:",btn:"Wikipedia öffnen"},
en:{label:"Learn more about the FDP here:",btn:"Open Wikipedia"},
es:{label:"Más información sobre el FDP aquí:",btn:"Abrir Wikipedia"}
}

const SECTIONS = [
{
key:"s1",
tone:"ink",
lines:{
de:[
{t:"Das war das Kampagnenvideo der Freien Demokratischen Partei",size:"lBig"},
{t:"zur Bundestagswahl 2025.",size:"lBig"}
],
en:[
{t:"That was the campaign video of the Free Democratic Party.",size:"lBig"},
{t:"for the 2025 federal election.",size:"lBig"}
],
es:[
{t:"Este fue el video de campaña del Partido Demócrata Libre",size:"lBig"},
{t:"para las elecciones federales de 2025.",size:"lBig"}
]
}
},

{
key:"s2",
tone:"ink",
lines:{
de:[
{t:"Hier wählten viele Menschen in Deutschland die FDP",size:"lMid"},
{t:"Auch ich bin Mitglieder der Freien Demokraten",size:"lMid"}
],
en:[
{t:"Many people in Germany voted for the FDP here",size:"lMid"},
{t:"I too, am a member of the Free Democrats.",size:"lMid"}
],
es:[
{t:"Mucha gente en Alemania votó por el FDP aquí",size:"lMid"},
{t:"También soy miembro de los Demócratas Libres.",size:"lMid"}
]
}
},

{
key:"s3",
tone:"emoSad",
lines:{
de:[
{t:"Doch nicht genug Menschen wählten die FDP",size:"lMid"},
{t:"wir erhielten unter 5%",size:"lMid"},
{t:"Und flogen somit aus dem Deutschen Bundestag.",size:"lSmall"}
],
en:[
{t:"But not enough people voted for the FDP",size:"lMid"},
{t:"We received less than 5%",size:"lMid"},
{t:"And were thus ousted from the German Bundestag.",size:"lSmall"}
],
es:[
{t:"Pero no hubo suficientes votantes por el FDP",size:"lMid"},
{t:"Recibimos menos del 5%",size:"lMid"},
{t:"Y, por lo tanto, fuimos expulsados ​​del Bundestag alemán.",size:"lSmall"}
]
}
},

{
key:"s4",
tone:"emoWarn",
lines:{
de:[
{t:"Der Verlust der FDP Bei der Bundestagswahl 2025 war unerträglich",size:"lMid"},
{t:"Und seitdem wird der Bundestag als Populismusmittel der Rechten und Linken verwendet",size:"lMid"}
],
en:[
{t:"The FDP's loss in the 2025 federal election was unbearable",size:"lMid"},
{t:"And since then, the Bundestag has been used as a tool for populism by both the right and the left.",size:"lMid"}
],
es:[
{t:"La derrota del FDP en las elecciones federales de 2025 fue insoportable",size:"lMid"},
{t:"Y desde entonces, el Bundestag ha sido utilizado como herramienta del populismo tanto por la derecha como por la izquierda.",size:"lMid"}
]
}
},

{
key:"s5",
tone:"ink",
lines:{
de:[
{t:"Ohne die Liberalen im Deutschen Bundestag läuft vieles Schief",size:"lMid"},
{t:"Die Wirtschaft, die Freiheit und vieles weitere verliert in Deutschland an Relevanz und Führsorge",size:"lSmall"}
],
en:[
{t:"Without the Liberals in the German Bundestag, many things go wrong",size:"lMid"},
{t:"The economy, freedom, and many other things lose relevance and care in Germany.",size:"lSmall"}
],
es:[
{t:"Sin los liberales en el Bundestag alemán, muchas cosas van mal",size:"lMid"},
{t:"La economía, la libertad y muchos otros aspectos pierden relevancia y apoyo en Alemania.",size:"lSmall"}
]
}
},

{
key:"s6",
tone:"emoHot",
finalCta:true,
lines:{
de:[
{t:"Doch so muss es nicht bleiben.",size:"lMid"},
{t:"Am 8 März ist in Baden-Württemberg eine Landtagswahl. Sie ist der Come Back der FDP.",size:"lSmall"},
{t:"Darum am 8. März deine Stimme FDP.",size:"lBig"}
],
en:[
{t:"But it doesn't have to stay that way. There will be a Baden-Württemberg State election on the 8th of March.",size:"lMid"},
{t:"If you have friends or family in Baden-Württemberg, Germany; inform them that their vote matters and they should,",size:"lSmall"},
{t:"Vote the FDP on the 8th of March.",size:"lBig"}
],
es:[
{t:"Pero no tiene por qué seguir así. Habrá elecciones en el estado de Baden-Württemberg el 8 de marzo.",size:"lMid"},
{t:"Si tienes amigos o familiares en Baden-Württemberg, Alemania; infórmales de que su voto importa y que deberían hacerlo.",size:"lSmall"},
{t:"Vota por el FDP el 8 de marzo.",size:"lBig"}
]
}
}
];

function estimate(lines){
let words=lines.join(" ").split(/\s+/).length
return Math.max(2000,words*MS_PER_WORD+1200)
}

function render(lines,tone){
textBox.innerHTML=""
let g=document.createElement("div")
g.className="group"

for(let t of lines){
let p=document.createElement("p")
p.className=`line lMid ${tone}`
p.textContent=t
g.appendChild(p)
}

textBox.appendChild(g)

requestAnimationFrame(()=>g.classList.add("show"))

return g
}

function renderFinal(lines,tone){

textBox.innerHTML=""

let pin=document.createElement("div")
pin.className="ctaPinned"

let headline=document.createElement("p")
headline.className=`line lBig ${tone}`
headline.textContent=lines[lines.length-1]

pin.appendChild(headline)

let card=document.createElement("div")
card.className="ctaCard"

let label=document.createElement("p")
label.textContent=CTA_I18N[currentLang].label

let btn=document.createElement("a")
btn.href=FDP_LINK
btn.target="_blank"
btn.className="ctaBtn"
btn.textContent=CTA_I18N[currentLang].btn

card.appendChild(label)
card.appendChild(btn)

pin.appendChild(card)
textBox.appendChild(pin)

requestAnimationFrame(()=>{
pin.style.top="18%"
})

endImage.classList.add("show")

}

async function runText(){

afterScene.style.opacity="1"
whiteFade.style.opacity="1"

await sleep(600)

langUI.style.display="block"

atmo.volume=0
atmo.play()

for(let i=1;i<=30;i++){
atmo.volume=i/30
await sleep(60)
}

for(let sec of SECTIONS){

let lines=sec.lines[currentLang]

if(sec.final){

renderFinal(lines,sec.tone)
return

}

let g=render(lines,sec.tone)

await sleep(estimate(lines))

g.style.opacity="0"

await sleep(600)

}

}

async function start(){

if(started)return
started=true

gate.style.opacity="0"

await sleep(400)

gate.style.display="none"

videoWrap.style.opacity="1"

await vid.play()

await new Promise(r=>vid.addEventListener("ended",r,{once:true}))

runText()

}

clickMe.onclick=start

document.addEventListener("keydown",(e)=>{

if(e.key==="Ö"||e.key==="ö"){

if(!vid.paused){

vid.pause()
runText()

}

}

})

langSelect.onchange=()=>{

currentLang=langSelect.value

}

</script>

</body>
</html>
