<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kampagnenvideo</title>

  <style>
    :root{
      --bg: #05070c;
      --ink: #0b1020;
      --white: #ffffff;

      --mutedW: rgba(255,255,255,.75);
      --strokeW: rgba(255,255,255,.18);

      /* emotional inks on white */
      --emoSad: #7e111c;   /* deep red */
      --emoWarn:#5b2b86;   /* violet */
      --emoHot: #8a1e2b;   /* red/rose */
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    body{ background: var(--bg); color: white; overflow:hidden; }

    .stage{
      position:fixed; inset:0;
      background: radial-gradient(1200px 800px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
                  linear-gradient(180deg, #060815, #02030a);
    }

    /* Video layer */
    .videoWrap{
      position:absolute; inset:0;
      opacity:0;
      transition: opacity 1100ms ease;
      pointer-events:none;
      will-change: opacity;
    }
    video{
      width:100%;
      height:100%;
      object-fit:cover;
      image-rendering:auto;
      transform: translateZ(0);
      filter: contrast(1.03) saturate(1.03);
    }
    .vignette{
      position:absolute; inset:0;
      background: radial-gradient(800px 500px at 50% 40%, transparent, rgba(0,0,0,.55) 70%),
                  linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.65));
      pointer-events:none;
    }

    /* Click gate (blurred world behind) */
    .gate{
      position:absolute; inset:0;
      display:grid; place-items:center;
      z-index:30;
      backdrop-filter: blur(16px) saturate(1.2);
      background: rgba(0,0,0,.35);
      transition: opacity 600ms ease;
    }
    .gateCard{
      width:min(520px, 90vw);
      padding: 18px 16px;
      border-radius: 20px;
      border: 1px solid var(--strokeW);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      box-shadow: 0 18px 70px rgba(0,0,0,.55);
      display:grid;
      gap:10px;
      text-align:center;
    }
    .clickMe{
      position:relative;
      display:inline-block;
      margin: 0 auto;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      color: #0b1020;
      font-weight: 800;
      letter-spacing:.3px;
      cursor:pointer;
      user-select:none;
      transform: translateZ(0);
    }
    .clickMe::after{
      content:"";
      position:absolute; inset:-10px;
      border-radius: 999px;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.55), transparent 60%);
      filter: blur(10px);
      opacity:0;
      animation: pulse 1.25s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes pulse{
      0%{ opacity:0; transform: scale(.98); }
      50%{ opacity:.9; transform: scale(1.02); }
      100%{ opacity:0; transform: scale(.98); }
    }
    .gateSub{
      margin:0;
      font-size: 13px;
      color: var(--mutedW);
      line-height:1.4;
    }

    /* White + text */
    .afterScene{
      position:absolute; inset:0;
      opacity:0;
      pointer-events:none;
      transition: opacity 550ms ease;
      z-index:40;
      background: transparent;
    }
    .whiteFade{
      position:absolute; inset:0;
      background: var(--white);
      opacity:0;
      transition: opacity 800ms ease;
    }

    .textStage{
      position:absolute; inset:0;
      display:grid;
      place-items:center;
      padding: 24px;
      color: var(--ink);
    }
    .textBox{
      width:min(980px, 92vw);
      text-align:center;
      padding: 8px 6px;
    }

    .group{
      display:grid;
      gap: 10px;
      opacity:0;
      transform: translateY(10px);
      filter: blur(2px);
      transition: opacity 520ms ease, transform 520ms ease, filter 520ms ease;
      will-change: opacity, transform, filter;
    }
    .group.show{
      opacity:1;
      transform: translateY(0);
      filter: blur(0);
    }
    .group.hide{
      opacity:0;
      transform: translateY(-8px);
      filter: blur(2px);
    }

    .line{
      margin:0;
      line-height:1.18;
      letter-spacing:.2px;
    }
    .lBig{ font-size: clamp(22px, 3.4vw, 44px); font-weight: 850; }
    .lMid{ font-size: clamp(16px, 2.1vw, 26px); font-weight: 700; }
    .lSmall{ font-size: clamp(14px, 1.7vw, 18px); font-weight: 600; opacity:.82; }

    .ink{ color: var(--ink); }
    .emoSad{ color: var(--emoSad); }
    .emoWarn{ color: var(--emoWarn); }
    .emoHot{ color: var(--emoHot); }

    /* CTA card (end) */
    .ctaCard{
      margin-top: 14px;
      display:grid;
      gap: 10px;
      justify-items:center;
      text-align:center;
      padding: 14px 14px;
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,.14);
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0,0,0,.12);
    }
    .ctaLabel{
      margin:0;
      font-size: 14px;
      font-weight: 750;
      letter-spacing:.2px;
      opacity:.88;
    }
    .ctaBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(11,16,32,.18);
      background: rgba(255,255,255,.92);
      color: #0b1020;
      text-decoration:none;
      font-weight: 850;
      letter-spacing:.2px;
      transform: translateZ(0);
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }
    .ctaBtn:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(0,0,0,.14);
      background: rgba(255,255,255,.98);
    }
    .ctaBtn:active{
      transform: translateY(0px);
      box-shadow: 0 6px 16px rgba(0,0,0,.12);
    }
    .ctaHint{
      font-size: 12px;
      opacity:.7;
      margin:0;
    }

    /* Language switch (after video) */
    .lang{
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 60;
      display:none;
      gap: 8px;
      align-items:center;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.18);
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(8px);
      color: #0b1020;
      font-weight: 750;
    }
    .lang select{
      border:0;
      background: transparent;
      font-weight: 750;
      outline:none;
      cursor:pointer;
    }

    /* End image + top white blend */
    .endWrap{
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      z-index:45;            /* above white bg but below text */
      pointer-events:none;
      opacity:0;
      transform: translateY(40px);
      transition: opacity 900ms ease, transform 900ms ease;
      will-change: opacity, transform;
    }
    .endWrap.show{
      opacity:1;
      transform: translateY(0);
    }
    .endImage{
      display:block;
      width:100%;
      height:auto;
      max-height: 45vh;      /* keep it from swallowing the whole screen */
      object-fit:cover;
    }
    .endTopFade{
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height: 180px;
      background: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0));
    }

    @media (prefers-reduced-motion: reduce){
      .videoWrap, .gate, .whiteFade, .afterScene, .group, .clickMe::after,
      .endWrap, .ctaBtn { transition:none !important; animation:none !important; }
    }
  </style>
</head>

<body>
  <div class="stage" id="stage">

    <div class="videoWrap" id="videoWrap" aria-hidden="true">
      <!-- NOTE: no "muted" attribute; video audio should play after click -->
      <video id="vid" playsinline preload="auto">
        <source src="campaign.mp4" type="video/mp4" />
      </video>
      <div class="vignette"></div>
    </div>

    <!-- Click gate -->
    <div class="gate" id="gate">
      <div class="gateCard">
        <div class="clickMe" id="clickMe">Click me.</div>
        <p class="gateSub">""</p>
      </div>
    </div>

    <!-- White + text -->
    <div class="afterScene" id="afterScene" aria-hidden="true">
      <div class="whiteFade" id="whiteFade"></div>

      <!-- End image (appears at the very end) -->
      <div class="endWrap" id="endWrap" aria-hidden="true">
        <img src="endimage.jpg" class="endImage" alt="" />
        <div class="endTopFade"></div>
      </div>

      <div class="textStage">
        <div class="textBox" id="textBox"></div>
      </div>
    </div>

    <div class="lang" id="langUI" title="Sprache">
      <span>LANG</span>
      <select id="langSelect">
        <option value="de">DE</option>
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
    </div>

    <!-- Atmo plays ONLY after video ends (NO LOOP now) -->
    <audio id="atmo" preload="auto">
      <source src="atmo.mp3" type="audio/mpeg" />
    </audio>

  </div>

  <script>
    const gate = document.getElementById('gate');
    const clickMe = document.getElementById('clickMe');

    const videoWrap = document.getElementById('videoWrap');
    const vid = document.getElementById('vid');

    const afterScene = document.getElementById('afterScene');
    const whiteFade = document.getElementById('whiteFade');
    const textBox = document.getElementById('textBox');

    const atmo = document.getElementById('atmo');

    const endWrap = document.getElementById('endWrap');

    const langUI = document.getElementById('langUI');
    const langSelect = document.getElementById('langSelect');

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    // Reading speed
    const WORDS_PER_MIN = 210;
    const MS_PER_WORD = 60000 / WORDS_PER_MIN;

    // ---- STATE ----
    let started = false;
    let textHasStarted = false;

    // Text language
    let currentLang = "de";

    // Track current section for language switching
    let activeSectionIndex = -1;
    let isFinalMode = false;
    let finalGroupRef = null;

    // Link
    const FDP_LINK = "https://en.wikipedia.org/wiki/Free_Democratic_Party_(Germany)";

    // CTA i18n
    const FINAL_CTA_I18N = {
      label: {
        de: "Mehr über die FDP erfahren:",
        en: "Learn more about the FDP here:",
        es: "Más información sobre el FDP aquí:"
      },
      button: {
        de: "Wikipedia öffnen",
        en: "Open Wikipedia",
        es: "Abrir Wikipedia"
      },
      hint: {
        de: "Öffnet in einem neuen Tab",
        en: "Opens in a new tab",
        es: "Se abre en una nueva pestaña"
      }
    };

    // ---- TEXT DATA (YOUR ORIGINAL) ----
    const SECTIONS = [
      {
        key: "s1",
        tone: "ink",
        lines: {
          de: [
            { t: "Das war das Kampagnenvideo der Freien Demokratischen Partei", size:"lBig" },
            { t: "zur Bundestagswahl 2025.", size:"lBig" }
          ],
          en: [
            { t: "That was the campaign video of the Free Democratic Party.", size:"lBig" },
            { t: "for the 2025 federal election.", size:"lBig" }
          ],
          es: [
            { t: "Este fue el video de campaña del Partido Demócrata Libre", size:"lBig" },
            { t: "para las elecciones federales de 2025.", size:"lBig" }
          ]
        }
      },
      {
        key: "s2",
        tone: "ink",
        lines: {
          de: [
            { t: "Hier wählten viele Menschen in Deutschland die FDP", size:"lMid" },
            { t: "Auch ich bin Mitglieder der Freien Demokraten", size:"lMid" }
          ],
          en: [
            { t: "Many people in Germany voted for the FDP here", size:"lMid" },
            { t: "I too, am a member of the Free Democrats.", size:"lMid" }
          ],
          es: [
            { t: "Mucha gente en Alemania votó por el FDP aquí", size:"lMid" },
            { t: "También soy miembro de los Demócratas Libres.", size:"lMid" }
          ]
        }
      },
      {
        key: "s3",
        tone: "emoSad",
        lines: {
          de: [
            { t: "Doch nicht genug Menschen wählten die FDP", size:"lMid" },
            { t: "wir erhielten unter 5%", size:"lMid" },
            { t: "Und flogen somit aus dem Deutschen Bundestag.", size:"lSmall" }
          ],
          en: [
            { t: "But not enough people voted for the FDP", size:"lMid" },
            { t: "We received less than 5%", size:"lMid" },
            { t: "And were thus ousted from the German Bundestag.", size:"lSmall" }
          ],
          es: [
            { t: "Pero no hubo suficientes votantes por el FDP", size:"lMid" },
            { t: "Recibimos menos del 5%", size:"lMid" },
            { t: "Y, por lo tanto, fuimos expulsados ​​del Bundestag alemán.", size:"lSmall" }
          ]
        }
      },
      {
        key: "s4",
        tone: "emoWarn",
        lines: {
          de: [
            { t: "Der Verlust der FDP Bei der Bundestagswahl 2025 war unerträglich", size:"lMid" },
            { t: "Und seitdem wird der Bundestag als Populismusmittel der Rechten und Linken verwendet", size:"lMid" }
          ],
          en: [
            { t: "The FDP's loss in the 2025 federal election was unbearable", size:"lMid" },
            { t: "And since then, the Bundestag has been used as a tool for populism by both the right and the left.", size:"lMid" }
          ],
          es: [
            { t: "La derrota del FDP en las elecciones federales de 2025 fue insoportable", size:"lMid" },
            { t: "Y desde entonces, el Bundestag ha sido utilizado como herramienta del populismo tanto por la derecha como por la izquierda.", size:"lMid" }
          ],
        }
      },
      {
        key: "s5",
        tone: "ink",
        lines: {
          de: [
            { t: "Ohne die Liberalen im Deutschen Bundestag läuft vieles Schief", size:"lMid" },
            { t: "Die Wirtschaft, die Freiheit und vieles weitere verliert in Deutschland an Relevanz und Führsorge", size:"lSmall" }
          ],
          en: [
            { t: "Without the Liberals in the German Bundestag, many things go wrong", size:"lMid" },
            { t: "The economy, freedom, and many other things lose relevance and care in Germany.", size:"lSmall" }
          ],
          es: [
            { t: "Sin los liberales en el Bundestag alemán, muchas cosas van mal", size:"lMid" },
            { t: "La economía, la libertad y muchos otros aspectos pierden relevancia y apoyo en Alemania.", size:"lSmall" }
          ]
        }
      },
      {
        key: "s6",
        tone: "emoHot",
        finalCta: true,
        lines: {
          de: [
            { t: "Doch so muss es nicht bleiben.", size:"lMid" },
            { t: "Am 8 März ist in Baden-Württemberg eine Landtagswahl. Sie ist der Come Back der FDP.", size:"lSmall" },
            { t: "Darum am 8. März deine Stimme FDP.", size:"lBig" }
          ],
          en: [
            { t: "But it doesn't have to stay that way. There will be a Baden-WürttembergState election on the 8th of March.", size:"lMid" },
            { t: "If you have friends or family in Baden-Württemberg, Germany; inform them that their vote matters and they should,", size:"lSmall" },
            { t: "Vote the FDP on the 8th of March.", size:"lBig" }
          ],
          es: [
            { t: "Pero no tiene por qué seguir así. Habrá elecciones en el estado de Baden-Württemberg el 8 de marzo.", size:"lMid" },
            { t: "Si tienes amigos o familiares en Baden-Württemberg, Alemania; infórmales de que su voto importa y que deberían hacerlo.", size:"lSmall" },
            { t: "Vota por el FDP el 8 de marzo.", size:"lBig" }
          ]
        }
      }
    ];

    function getLinesFor(section){
      return section.lines[currentLang] || section.lines.de;
    }

    function estimateHoldMs(lineObjs){
      const words = lineObjs
        .map(x => (x?.t || "").trim().split(/\s+/).filter(Boolean).length)
        .reduce((a,b)=>a+b,0);

      const base = 900;
      const read = words * MS_PER_WORD;
      const extra = 900;
      return Math.max(1800, base + read + extra);
    }

    function renderGroup(section){
      textBox.innerHTML = "";

      const group = document.createElement("div");
      group.className = "group";

      const toneClass = section.tone || "ink";
      const lines = getLinesFor(section);

      for(const ln of lines){
        const p = document.createElement("p");
        p.className = `line ${ln.size || "lMid"} ${toneClass}`;
        p.textContent = ln.t || "";
        group.appendChild(p);
      }

      textBox.appendChild(group);

      // Let layout happen, then fade in
      requestAnimationFrame(() => group.classList.add("show"));

      return { group, lines };
    }

    function applyCtaLanguage(groupEl){
      const labelEl = groupEl.querySelector("[data-cta-label]");
      const btnEl   = groupEl.querySelector("[data-cta-btn]");
      const hintEl  = groupEl.querySelector("[data-cta-hint]");
      if (!labelEl || !btnEl || !hintEl) return;

      labelEl.textContent = FINAL_CTA_I18N.label[currentLang] || FINAL_CTA_I18N.label.de;
      btnEl.textContent   = FINAL_CTA_I18N.button[currentLang] || FINAL_CTA_I18N.button.de;
      hintEl.textContent  = FINAL_CTA_I18N.hint[currentLang] || FINAL_CTA_I18N.hint.de;
    }

    function enterFinalMode(existingGroup){
      // We will NOT replace the group — we modify it in-place to avoid micro-stutter.
      isFinalMode = true;
      finalGroupRef = existingGroup;

      const ps = Array.from(existingGroup.querySelectorAll("p"));

      // Fade out all but last line
      for (let j=0; j<ps.length-1; j++){
        ps[j].style.transition = "opacity 520ms ease, transform 520ms ease, filter 520ms ease";
        ps[j].style.opacity = "0";
        ps[j].style.transform = "translateY(-6px)";
        ps[j].style.filter = "blur(2px)";
      }

      // Smoothly move the SAME group upward (no replacement)
      existingGroup.style.transition = "opacity 520ms ease, transform 900ms ease, filter 520ms ease";
      requestAnimationFrame(() => {
        existingGroup.style.transform = "translateY(-32vh)";
      });

      // Add CTA card under last line (once)
      let card = existingGroup.querySelector(".ctaCard");
      if (!card){
        card = document.createElement("div");
        card.className = "ctaCard";

        const label = document.createElement("p");
        label.className = "ctaLabel ink";
        label.setAttribute("data-cta-label","1");

        const btn = document.createElement("a");
        btn.className = "ctaBtn";
        btn.href = FDP_LINK;
        btn.target = "_blank";
        btn.rel = "noopener noreferrer";
        btn.setAttribute("data-cta-btn","1");

        const hint = document.createElement("p");
        hint.className = "ctaHint ink";
        hint.setAttribute("data-cta-hint","1");

        card.appendChild(label);
        card.appendChild(btn);
        card.appendChild(hint);

        existingGroup.appendChild(card);
      }

      applyCtaLanguage(existingGroup);

      // Fade in end image from bottom
      endWrap.classList.add("show");
    }

    async function fadeAtmoIn(){
      atmo.currentTime = 0;
      atmo.volume = 0;

      try{
        await atmo.play();
      }catch(e){
        return; // if blocked, just skip
      }

      const target = 1.0;
      const dur = 2200;
      const steps = 40;
      for (let i=1;i<=steps;i++){
        atmo.volume = target * (i/steps);
        await sleep(dur/steps);
      }
      atmo.volume = target;
    }

    async function runTextSequence(){
      if (textHasStarted) return;
      textHasStarted = true;

      afterScene.style.opacity = "1";
      afterScene.style.pointerEvents = "auto";

      // fade to white
      whiteFade.style.opacity = "1";
      await sleep(600);

      // show language selector only after the video is done
      langUI.style.display = "flex";

      // start atmo now (NOT during video) - NO LOOP
      fadeAtmoIn().catch(()=>{});

      for (let i=0; i<SECTIONS.length; i++){
        activeSectionIndex = i;
        const section = SECTIONS[i];

        const { group, lines } = renderGroup(section);

        // fade in
        await sleep(50);
        // (class added via RAF in renderGroup)

        // hold
        await sleep(estimateHoldMs(lines));

        if (section.finalCta){
          // Enter final mode without replacing nodes (no stutter)
          enterFinalMode(group);
          return;
        }

        // fade out
        group.classList.add("hide");
        await sleep(620);
      }
    }

    let startedFlow = false;

    async function startFlow(){
      if (startedFlow) return;
      startedFlow = true;

      // Remove gate
      gate.style.opacity = "0";
      await sleep(450);
      gate.style.display = "none";

      // Show video (fade in)
      videoWrap.style.opacity = "1";

      // Ensure video audio is allowed (click gesture) and not muted
      vid.muted = false;
      vid.currentTime = 0;

      try{
        await vid.play();
      }catch(e){
        // If it still fails, re-open gate
        gate.style.display = "grid";
        gate.style.opacity = "1";
        startedFlow = false;
        return;
      }

      // Wait for video end
      await new Promise(resolve => vid.addEventListener("ended", resolve, { once:true }));

      // Immediately proceed to white/text (and start atmo there)
      await runTextSequence();
    }

    // Start triggers (click anywhere on gate)
    clickMe.addEventListener("click", startFlow);
    gate.addEventListener("click", (e) => { if (e.target === gate) startFlow(); });

    // Skip video with Ö / ö while video is running
    document.addEventListener("keydown", (e) => {
      if (e.key === "Ö" || e.key === "ö") {
        // Only if video is actually playing (and text hasn't started yet)
        if (startedFlow && !textHasStarted && !vid.paused && vid.currentTime > 0 && !vid.ended) {
          // Jump to end so the normal 'ended' flow continues cleanly
          const t = (isFinite(vid.duration) && vid.duration > 0) ? (vid.duration - 0.05) : 0;
          vid.currentTime = Math.max(0, t);
        }
      }
    });

    // Language switching after video: re-render current section / update final CTA
    langSelect.addEventListener("change", () => {
      currentLang = langSelect.value;

      // If we're in final mode, only update CTA label/button/hint and the visible text lines
      if (isFinalMode && finalGroupRef){
        // Update the last line text too (the one still visible)
        const final = SECTIONS.find(s => s.finalCta);
        if (final){
          const lines = getLinesFor(final);
          const ps = Array.from(finalGroupRef.querySelectorAll("p")).filter(p => !p.hasAttribute("data-cta-label") && !p.hasAttribute("data-cta-hint"));
          // ps includes CTA label/hint? We excluded by attributes; button is <a>. Good.
          // We want to set the LAST "content" line's text to the final line
          const lastText = lines[lines.length - 1]?.t || "";
          // find the last <p> that is not a CTA label/hint and not hidden (we'll just pick the last content p)
          const contentPs = Array.from(finalGroupRef.querySelectorAll("p")).filter(p => !p.hasAttribute("data-cta-label") && !p.hasAttribute("data-cta-hint"));
          if (contentPs.length){
            contentPs[contentPs.length - 1].textContent = lastText;
          }
        }
        applyCtaLanguage(finalGroupRef);
        return;
      }

      // If mid-sequence, re-render the current section instantly
      if (activeSectionIndex >= 0 && activeSectionIndex < SECTIONS.length){
        const section = SECTIONS[activeSectionIndex];
        const { group } = renderGroup(section);
        group.classList.add("show");
      }
    });

    // Preload hint
    window.addEventListener("DOMContentLoaded", () => {
      vid.load();
    });
  </script>
</body>
</html>
