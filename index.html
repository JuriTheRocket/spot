<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kampagnenvideo</title>
  <style>
    :root{
      --bg: #05070c;
      --ink: #0b1020;
      --white: #ffffff;
      --soft: rgba(255,255,255,.86);
      --muted: rgba(255,255,255,.70);

      --a: #ffffff;
      --b: #f6f0ff;
      --c: #ffe9e9;
      --d: #fff6df;
      --e: #dff7ff;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    body{ background: var(--bg); color: white; overflow:hidden; }

    .stage{
      position:fixed; inset:0;
      display:grid; place-items:center;
      background: radial-gradient(1200px 800px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
                  linear-gradient(180deg, #060815, #02030a);
    }

    .videoWrap{
      position:absolute; inset:0;
      display:grid; place-items:center;
      opacity:0;
      transition: opacity 1400ms ease;
      pointer-events:none;
    }
    video{
      width:100%;
      height:100%;
      object-fit:cover;
      filter: contrast(1.02) saturate(1.02);
    }
    .vignette{
      position:absolute; inset:0;
      background: radial-gradient(800px 500px at 50% 40%, transparent, rgba(0,0,0,.55) 70%),
                  linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.65));
      pointer-events:none;
    }

    .afterScene{
      position:absolute; inset:0;
      display:grid; place-items:center;
      opacity:0;
      pointer-events:none;
      transition: opacity 1600ms ease;
      z-index:20;
    }
    .whiteFade{
      position:absolute; inset:0;
      background: var(--white);
      opacity:0;
      transition: opacity 1600ms ease;
    }
    .glow{
      position:absolute; inset:-30%;
      background: radial-gradient(circle at 50% 35%, rgba(255,255,255,.95), rgba(255,255,255,.55) 35%, transparent 70%);
      opacity:0;
      transition: opacity 2000ms ease;
      filter: blur(6px);
      mix-blend-mode: screen;
    }

    .textWrap{
      position:relative;
      width:min(920px, 92vw);
      padding: 20px 18px;
      text-align:center;
      color: var(--ink);
    }
    .line{
      opacity:0;
      transform: translateY(10px);
      transition: opacity 900ms ease, transform 900ms ease, filter 900ms ease;
      margin: 10px 0;
      line-height:1.25;
      letter-spacing:.2px;
      filter: blur(2px);
    }
    .line.show{
      opacity:1;
      transform: translateY(0);
      filter: blur(0);
    }
    .big{ font-size: clamp(22px, 3.6vw, 44px); font-weight:800; }
    .mid{ font-size: clamp(16px, 2.2vw, 24px); font-weight:650; }
    .small{ font-size: clamp(14px, 1.8vw, 18px); font-weight:560; color: rgba(11,16,32,.78); }

    .cA{ color: var(--ink); }
    .cB{ color: #3a2a6b; }
    .cC{ color: #8a1e2b; }
    .cD{ color: #7a5200; }
    .cE{ color: #0a4a5a; }

    .particles{
      position:absolute; inset:0;
      opacity:0;
      transition: opacity 1800ms ease;
      pointer-events:none;
      z-index:25;
    }
    .particle{
      position:absolute;
      width: 6px; height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.85);
      box-shadow: 0 0 20px rgba(255,255,255,.55);
      animation: floatUp linear infinite;
      opacity:0;
    }
    @keyframes floatUp{
      0%{ transform: translateY(30px); opacity:0; }
      15%{ opacity:.55; }
      70%{ opacity:.35; }
      100%{ transform: translateY(-220px); opacity:0; }
    }

    /* Tiny sound button (only if needed) */
    .soundBtn{
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 50;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.10);
      color: rgba(255,255,255,.92);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 650;
      cursor: pointer;
      backdrop-filter: blur(6px);
      display:none;
    }
    .soundBtn:hover{ transform: translateY(-1px); }
    .soundBtn:active{ transform: translateY(0); opacity:.92; }

    @media (prefers-reduced-motion: reduce){
      .videoWrap, .afterScene, .whiteFade, .glow, .line{ transition:none !important; animation:none !important; }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">

    <div class="videoWrap" id="videoWrap" aria-hidden="true">
      <video id="vid" playsinline preload="auto" muted>
        <source src="campaign.mp4" type="video/mp4" />
      </video>
      <div class="vignette"></div>
    </div>

    <div class="afterScene" id="afterScene" aria-hidden="true">
      <div class="whiteFade" id="whiteFade"></div>
      <div class="glow" id="glow"></div>
      <div class="particles" id="particles"></div>
      <div class="textWrap" id="textWrap"></div>
    </div>

    <audio id="atmo" preload="auto">
      <source src="atmo.mp3" type="audio/mpeg" />
    </audio>

  </div>

  <button class="soundBtn" id="soundBtn">Sound an</button>

  <script>
    const videoWrap = document.getElementById('videoWrap');
    const vid = document.getElementById('vid');

    const afterScene = document.getElementById('afterScene');
    const whiteFade = document.getElementById('whiteFade');
    const glow = document.getElementById('glow');
    const textWrap = document.getElementById('textWrap');

    const atmo = document.getElementById('atmo');
    const particles = document.getElementById('particles');
    const soundBtn = document.getElementById('soundBtn');

    // --- YOUR TEXT (fixed array syntax) ---
    const LINES = [
      { text: "Das war das Kampagnenvideo der Freien Demokratischen Partei zur Bundestagswahl 2025.", cls: "big cA", delay: 800 },
      { text: "Auch ich bin Mitglied der FDP und wählte damals die Liberalen.", cls: "mid cE", delay: 2200 },
      { text: "Doch in der Bundestagswahl 2025, fielen wir unter die 5% Hürde. Wir wurden somit aus dem Bundestag herraus geworfen.", cls: "small cA", delay: 3800 },
      { text: "Das fehlen der Liberalen Stimme verändert das allgemeine Miteinander im Deutschen Bundestag.", cls: "mid cB", delay: 5600 },
      { text: "Der Bundestag ist nun ein Medium für die Weitrechte und die weit Linken als Wahlmaterial für Populistische Reden.", cls: "mid cC", delay: 7400 },
      { text: "Die Bundesregierung ist ebenfalls betroffen. Die Wirtschaft wird immer schlechter, die Preise immer Höher.", cls: "big cD", delay: 9800 },
      { text: "Aber das kann man Retten. Am 8. März startet in Baden-Württemberg eine Landtagswahl. Ihre Stimme: FDP.", cls: "small cA", delay: 11800 }
    ];

    function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

    function buildLines(){
      textWrap.innerHTML = "";
      for (const item of LINES){
        const div = document.createElement('div');
        div.className = `line ${item.cls}`;
        div.textContent = item.text;
        textWrap.appendChild(div);
      }
    }

    function spawnParticles(count = 22){
      particles.innerHTML = "";
      for (let i=0;i<count;i++){
        const p = document.createElement('div');
        p.className = "particle";
        const left = Math.random() * 100;
        const top = 70 + Math.random()*30;
        const dur = 6 + Math.random()*6;
        const delay = Math.random()*3;
        const size = 3 + Math.random()*6;
        p.style.left = left + "%";
        p.style.top = top + "%";
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.animationDuration = dur + "s";
        p.style.animationDelay = delay + "s";
        particles.appendChild(p);
      }
    }

    async function startFlow(){
      // Video fade in
      videoWrap.style.opacity = "1";

      // Autoplay reliability: start muted.
      vid.muted = true;
      vid.currentTime = 0;

      // Try to play
      try{
        await vid.play();
      }catch(e){
        // If autoplay fails completely, allow a single click anywhere to start.
        const clickStart = async () => {
          document.removeEventListener('pointerdown', clickStart);
          try{ await vid.play(); }catch(_){}
        };
        document.addEventListener('pointerdown', clickStart, { once:true });
      }

      // Offer sound enable (optional)
      soundBtn.style.display = "block";
      soundBtn.addEventListener('click', async () => {
        // This click counts as a user gesture; now audio/video unmute is allowed.
        try{
          vid.muted = false;
        }catch(_){}
        soundBtn.style.display = "none";
      }, { once:true });

      // Wait for video end
      await new Promise(resolve => vid.addEventListener('ended', resolve, { once:true }));

      // Try to play ambience (may be blocked unless user clicked Sound an / anywhere)
      let atmoPlayed = false;
      try{
        atmo.currentTime = 0;
        await atmo.play();
        atmoPlayed = true;
      }catch(e){
        // If blocked, show button again to enable and play.
        soundBtn.textContent = "Sound an";
        soundBtn.style.display = "block";
        soundBtn.onclick = async () => {
          soundBtn.style.display = "none";
          try{
            atmo.currentTime = 0;
            await atmo.play();
            atmoPlayed = true;
          }catch(_){}
        };
      }

      // If the audio is playing, wait until it ends; otherwise continue immediately.
      if (atmoPlayed){
        await new Promise(resolve => atmo.addEventListener('ended', resolve, { once:true }));
      }

      // Transition to white / text
      afterScene.style.opacity = "1";
      whiteFade.style.opacity = "1";
      glow.style.opacity = "1";

      buildLines();
      spawnParticles();
      particles.style.opacity = "1";

      // Show lines sequentially
      const lineEls = Array.from(textWrap.querySelectorAll('.line'));
      const t0 = performance.now();

      for (let i=0;i<LINES.length;i++){
        const targetAt = LINES[i].delay;
        const now = performance.now() - t0;
        const wait = Math.max(0, targetAt - now);
        await sleep(wait);
        lineEls[i].classList.add('show');
      }
    }

    window.addEventListener('DOMContentLoaded', startFlow);
  </script>
</body>
</html>
